name: Build Windows NSIS Installer

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'

permissions:
  contents: read

concurrency:
  group: panda-island-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-build:
    name: Test and build Windows x64
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust MSVC
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint TypeScript
        run: npm run lint

      - name: Check TypeScript
        run: npm run typecheck

      - name: Run frontend tests
        run: npm run test:run

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml

      - name: Lint Rust
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build NSIS installer
        run: npm run tauri:build

      - name: Prepare portable executable
        shell: pwsh
        run: |
          $source = "src-tauri/target/release/panda-island.exe"
          $portable = "src-tauri/target/release/Panda-Island-v0.2.0-Portable.exe"
          if (-not (Test-Path $source)) { throw "Portable executable not found" }
          Copy-Item $source $portable

      - name: Create checksums
        shell: pwsh
        run: |
          $files = @(
            Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe"
            Get-Item "src-tauri/target/release/Panda-Island-v0.2.0-Portable.exe"
          )
          if ($files.Count -lt 2) { throw "Windows build outputs not found" }
          $files | ForEach-Object {
            $hash = Get-FileHash $_.FullName -Algorithm SHA256
            "$($hash.Hash.ToLower())  $($_.Name)" | Add-Content "src-tauri/target/release/SHA256SUMS.txt"
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Panda-Island-Windows-x64-NSIS
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/Panda-Island-v0.2.0-Portable.exe
            src-tauri/target/release/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
